name: Build and Deploy

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]
        types: [opened, synchronize, reopened, closed]
    issue_comment:
        types: [created]

jobs:
    build:
        if: |
            (github.event_name == 'push') ||
            (github.event_name == 'pull_request' && github.event.action != 'closed')
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Determine Tag
              id: vars
              run: |
                  if [ "${{ github.event_name }}" == "pull_request" ]; then
                    TAG="pr-${{ github.event.pull_request.number }}-${GITHUB_SHA:0:7}"
                  elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
                    TAG="${GITHUB_SHA:0:7}"
                  else
                    TAG="dev-${GITHUB_SHA:0:7}"
                  fi
                  echo "tag=${TAG}" >> $GITHUB_OUTPUT

            - name: Configure AWS
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: us-east-1

            - name: Login to ECR
              run: |
                  aws ecr get-login-password --region us-east-1 | \
                    docker login --username AWS --password-stdin 521520215337.dkr.ecr.us-east-1.amazonaws.com

            - name: Build and Push
              run: |
                  docker build -t 521520215337.dkr.ecr.us-east-1.amazonaws.com/mindplex-semantic:${{ steps.vars.outputs.tag }} .
                  docker push 521520215337.dkr.ecr.us-east-1.amazonaws.com/mindplex-semantic:${{ steps.vars.outputs.tag }}
                  echo "Image pushed: ${{ steps.vars.outputs.tag }}"

            - name: Trigger Deploy (only on main/develop push)
              if: github.event_name == 'push'
              run: |
                  curl -X POST \
                    -H "Authorization: token ${{ secrets.INFRA_REPO_PAT }}" \
                    -H "Accept: application/vnd.github.v3+json" \
                    https://api.github.com/repos/Xcceleran-do/mindplex_infra/dispatches \
                    -d '{"event_type":"deploy","client_payload":{"tag":"${{ steps.vars.outputs.tag }}"}}'

    preview:
        if: |
            github.event_name == 'issue_comment' &&
            github.event.issue.pull_request &&
            contains(github.event.comment.body, 'preview')
        runs-on: ubuntu-latest
        steps:
            - name: Get PR details
              id: pr
              uses: actions/github-script@v7
              with:
                  script: |
                      const pr = await github.rest.pulls.get({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        pull_number: context.issue.number
                      });
                      core.setOutput('sha', pr.data.head.sha);
                      core.setOutput('number', context.issue.number);

            - name: Trigger Preview Deployment
              run: |
                  TAG="pr-${{ steps.pr.outputs.number }}-${{ steps.pr.outputs.sha }}"
                  TAG="${TAG:0:50}"

                  curl -X POST \
                    -H "Authorization: token ${{ secrets.INFRA_REPO_PAT }}" \
                    -H "Accept: application/vnd.github.v3+json" \
                    https://api.github.com/repos/Xcceleran-do/mindplex_infra/dispatches \
                    -d "{\"event_type\":\"preview\",\"client_payload\":{\"tag\":\"${TAG}\",\"pr_number\":\"${{ steps.pr.outputs.number }}\"}}"

    cleanup:
        if: github.event_name == 'pull_request' && github.event.action == 'closed'
        runs-on: ubuntu-latest

        steps:
            - name: Trigger Preview Cleanup
              run: |
                  curl -X POST \
                    -H "Authorization: token ${{ secrets.INFRA_REPO_PAT }}" \
                    -H "Accept: application/vnd.github.v3+json" \
                    https://api.github.com/repos/Xcceleran-do/mindplex_infra/dispatches \
                    -d '{"event_type":"cleanup","client_payload":{"pr_number":"${{ github.event.pull_request.number }}"}}'
